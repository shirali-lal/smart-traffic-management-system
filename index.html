<!DOCTYPE html>
<html>
<head>
    <title>Smart Traffic System</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
            font-size: 40px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .lane {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            width: 150px;
            transition: 0.3s;
        }

        .lane.active {
            background: #16a34a;
            transform: scale(1.1);
        }

        .lane h2 {
            margin: 10px 0;
        }

        .signal {
            margin-top: 30px;
            font-size: 30px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>🚦 Smart Traffic Management</h1>

<div class="container">
    <div class="lane" id="lane1">
        <h2>Lane 1</h2>
        <p id="l1">0</p>
    </div>

    <div class="lane" id="lane2">
        <h2>Lane 2</h2>
        <p id="l2">0</p>
    </div>

    <div class="lane" id="lane3">
        <h2>Lane 3</h2>
        <p id="l3">0</p>
    </div>

    <div class="lane" id="lane4">
        <h2>Lane 4</h2>
        <p id="l4">0</p>
    </div>
</div>

<div class="signal" id="signal">
    Waiting...
</div>
<div class="signal" id="speed">
    Speed: 0
</div>
<div id="alert" style="display:none; color:red; font-size:25px; margin-top:20px;">
    🚨 OVER-SPEED DETECTED!
</div>
<script>
async function load() {
    let res = await fetch("/traffic");
    let data = await res.json();

    document.getElementById("l1").innerText = data.lane1;
    document.getElementById("l2").innerText = data.lane2;
    document.getElementById("l3").innerText = data.lane3;
    document.getElementById("l4").innerText = data.lane4;
    document.getElementById("speed").innerText = "Avg Speed: " + data.avg_speed;

    // Reset all lanes
    document.querySelectorAll(".lane").forEach(l => l.classList.remove("active"));

    // Extract green lane number
    let match = data.result.match(/\d+/);
    if (match) {
        let green = match[0];
        document.getElementById("lane" + green).classList.add("active");
    }

    document.getElementById("signal").innerText = data.result;

    document.getElementById("speed").innerText = "Avg Speed: " + data.avg_speed;

// Overspeed alert
    if (data.avg_speed > 50) {
        document.getElementById("alert").classList.add("alert-active");
    } else {
        document.getElementById("alert").classList.remove("alert-active");
    }
}

setInterval(load, 1000);
</script>

</body>
</html>
